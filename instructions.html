<!DOCTYPE html>
  <head>
      <title>Era 2050AD</title>
      <link rel="stylesheet" href="pages.css">
      <script src="https://kit.fontawesome.com/e7dfe44f3e.js" crossorigin="anonymous"></script>
  </head>
  <body class="instructionspage">
     <div class="instructions_main_cnt">
      <div class="instructions_card">
        <p id="typeText"></p>
        <div class="instructions_bottom">
           <div class="instructions_bottom_left">
             <a href="#">Skip</a>
          </div>
          <div class="instructions_bottom_right">
             <button id="nextBtn" onclick="next()">Next</button>
          </div>
        </div>
      </div>
     </div>

<audio id="bgMusic" autoplay loop>
  <source src="game-background-sound.mp3" type="audio/mpeg">
</audio>

     <script>
      
const texts = [
  "Welcome to Era 2050AD, It's 2050 and the world is destroyed completely. Only few humans could survive and they all live inside a high tech base. And this game is all about controlling the base systems like controlling the base oxygen levels, conducting research inside the base, watch the CCTV cameras, contact aliens and lot more...",
  "This game doesn't have any graphics. Instead of calling it a game, it's better to call it a simulation.",
  "There is no winning or losing in this game and you can play with the base systems however you want.",
  "Good luck."
];

let textIndex = 0;
let charIndex = 0;

const element = document.getElementById("typeText");
const nextBtn = document.getElementById("nextBtn");

function typeEffect() {
  if (charIndex < texts[textIndex].length) {
    element.textContent += texts[textIndex][charIndex];
    charIndex++;
    setTimeout(typeEffect, 40);
  }
}

function showText() {
  element.textContent = "";
  charIndex = 0;
  typeEffect();
}

nextBtn.addEventListener("click", () => {

  if (textIndex === texts.length - 1) {
    window.location.href = "game.html";
    return;
  }

  textIndex++;
  showText();
});

showText();
     </script>
  </body>
</html>
