<!DOCTYPE html>
<head>
   <title>Era 2050AD</title>
   <link rel="stylesheet" href="game.css">
    <script src="https://kit.fontawesome.com/e7dfe44f3e.js" crossorigin="anonymous"></script>
</head>
<body class="atmosphere_radiationpage">
    <div class="atmosphere_radiation_main_cnt">
        <h1>RADIATION SHIELD</h1>
         <div class="radiation_bottom_cnt">
            <div class="radiation_left_cnt">
                <div class="radiation_left_top_cnt">
                <div class="radiation_battery">
                   <div></div>
                </div>
                <div class="radiation_battery_backup">
                    <div></div>
                    <div></div>
                    <div></div>
                    <div></div>
                </div>
                </div>
                
            <div class="radiation_left_bottom_cnt">
                <div class="radiation_battery_bottom">
                   <h3>Battery</h3>
                   <p>Status:<br>in-use</p>
                   <p class="percentage3">25%</p>
                </div>
                <div class="radiation_battery_backup_bottom">
                   <h3>Backup</h3>
                   <p>Status:<br>fully-charged</p>
                   <p class="percentage3">100%</p>
                </div>
            </div>

            </div>
            <div class="radiation_right_cnt">
                <div class="radiation_right_top">
                    <h3>Radiation incoming </h3>
                    <p>40 µSv/h</p>
                </div>
                <div class="radiation_right_middle">
                    <h3>Radiation resisting </h3>
                    <p>27.74 µSv/h</p>
                </div>
                <div class="radiation_right_bottom">
                    <h3>Radiation penetrating </h3>
                    <p>12.26 µSv/h</p>
                </div>
            </div>
            <div class="shield_power" id="shieldPower">
                <h2><i class="fa-solid fa-shield-halved"></i></h2>
                <h3>100%</h3>
            </div>
            <div class="semi_globe">
                 <div class="hex-layer"><i class="fa-solid fa-circle-radiation"></i></div>
            </div>
         </div>
    </div>
</body>
</html>
