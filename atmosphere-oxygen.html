<!DOCTYPE html>
<head>
   <link rel="stylesheet" href="game.css">
   <title>Era 2050AD</title>
   <script src="https://kit.fontawesome.com/e7dfe44f3e.js" crossorigin="anonymous"></script>
</head>
<body class="atmosphere_oxygenpage">
   <div class="atmosphere_oxygen_main_cnt">
     <div class="atmosphere_oxygen_top">
        <div class="water">
            <p>Water (H₂O)</p>
            <p class="percent_2">1000 L/h</p>
        </div>
        <i id="right_arrow" class="fa-solid fa-right-long"></i>
        <div class="hydrogen">
            <p>Hydrogen (H₂)</p>
            <p class="percent_2">600 L/h</p>
        </div>
        <i id="plus" class="fa-solid fa-plus"></i>
        <div class="oxygen">
            <p>Oxygen (O₂)</p>
            <p class="percent_2">400 L/h</p>
        </div>
     </div>

     <div class="atmosphere_oxygen_middle">
        <div class="switch_cnt">
               <p>Power</p>
               <label class="switch">
               <input type="checkbox" id="oxygenSwitch">
               <span class="slider"></span>
               </label>
        </div>
     </div>
   </div>
</body>
</html>
