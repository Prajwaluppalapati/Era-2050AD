<!DOCTYPE html>
<head>
   <link rel="stylesheet" href="game.css">
   <title>Era 2050AD</title>
   <script src="https://kit.fontawesome.com/e7dfe44f3e.js" crossorigin="anonymous"></script>
</head>
<body class="atmosphere_oxygenpage">
   <div class="atmosphere_oxygen_main_cnt">
     <div class="atmosphere_oxygen_top">
        <div class="water">
            <p>Water (H₂O)</p>
            <p id="water_number" class="percent_2"></p>
            <div class="cards_bottom">
                <p id="current_indication"></p>
                <p id="temperature_indication"></p>
            </div>
        </div>
        <i id="right_arrow" class="fa-solid fa-right-long"></i>
        <div class="hydrogen">
            <p>Hydrogen (H₂)</p>
            <p id="hydrogen_number" class="percent_2"></p>
             <div class="cards_bottom">
                <p id="current_indication">Storage: 3000L</p>
                <p id="temperature_indication">Release: 100L</p>
            </div>
        </div>
        <i id="plus" class="fa-solid fa-plus"></i>
        <div class="oxygen">
            <p>Oxygen (O₂)</p>
            <p id="oxygen_number" class="percent_2"></p>
             <div class="cards_bottom">
                <p id="current_indication">Storage: 500L</p>
                <p id="temperature_indication">Release: 2500L</p>
            </div>
        </div>
     </div>

     <div class="atmosphere_oxygen_middle">
        <div class="switch_cnt">
               <p>Power</p>
               <label class="switch">
               <input type="checkbox" id="powerSwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
        <div class="switch_cnt">
               <p>Water Supply</p>
               <label class="switch">
               <input type="checkbox" id="waterSupplySwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
        <div class="switch_cnt">
               <p>Oxygen Storage</p>
               <label class="switch">
               <input type="checkbox" id="oxygenStorageSwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
        <div class="switch_cnt">
               <p>Oxygen Release</p>
               <label class="switch">
               <input type="checkbox" id="oxygenReleaseSwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
        <div class="switch_cnt">
               <p>Hydrogen Storage</p>
               <label class="switch">
               <input type="checkbox" id="hydrogenStorageSwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
        <div class="switch_cnt">
               <p>Hydrogen Release</p>
               <label class="switch">
               <input type="checkbox" id="hydrogenReleaseSwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
        <div class="switch_cnt">
               <p>Temp control</p>
               <label class="switch">
               <input type="checkbox" id="tempControlSwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
        <div class="switch_cnt">
               <p>Automatic mode</p>
               <label class="switch">
               <input type="checkbox" id="oxygenSwitch" checked>
               <span class="slider"></span>
               </label>
        </div>
     </div>
     <div class="atmosphere_oxygen_bottom">
        <input id="r1" type="range" min="0" max="1000" value="600" class="power_range_vertical">
        <input id="r2" type="range" min="0" max="100" value="60" class="power_range_vertical">
        <input id="r3" type="range" min="0" max="100" value="20" class="power_range_vertical">
        <input id="r4" type="range" min="0" max="100" value="80" class="power_range_vertical">
        <input id="r5" type="range" min="0" max="100" value="90" class="power_range_vertical">
        <input id="r6" type="range" min="0" max="100" value="10" class="power_range_vertical">
        <input id="r7" type="range" min="0" max="100" value="26" class="power_range_vertical">
     </div>
   </div>

   <!-- Script for switch and range control -->
    <script>
const switches = [
  "powerSwitch",
  "waterSupplySwitch",
  "oxygenStorageSwitch",
  "oxygenReleaseSwitch",
  "hydrogenStorageSwitch",
  "hydrogenReleaseSwitch",
  "tempControlSwitch"
];

const ranges = [
  "r1","r2","r3","r4","r5","r6","r7"
];

switches.forEach((id, index) => {
  const sw = document.getElementById(id);
  const range = document.getElementById(ranges[index]);

  function updateRange() {
    if (sw.checked) {
      // ON → enable
      range.style.opacity = "1";
      range.style.filter = "none";
      range.disabled = false;
      range.style.cursor = "pointer";
    } else {
      // OFF → disable
      range.style.opacity = "0.3";
      range.style.filter = "grayscale(100%)";
      range.disabled = true;              
      range.style.cursor = "not-allowed"; 
    }
  }

  // Initial state
  updateRange();

  // On change
  sw.addEventListener("change", updateRange);
});

const storageSwitch = document.getElementById("storageReleaseSwitch");
const r4 = document.getElementById("r4");

if (storageSwitch && r4) {

  storageSwitch.addEventListener("change", () => {

    if (!storageSwitch.checked) {  // OFF state
      r4.value = 0;
    }

  });

}

const powerSwitch = document.getElementById("powerSwitch");

const otherSwitches = [
  "waterSupplySwitch",
  "oxygenStorageSwitch",
  "oxygenReleaseSwitch",
  "hydrogenStorageSwitch",
  "hydrogenReleaseSwitch",
  "tempControlSwitch",
  "oxygenSwitch"
];

powerSwitch.addEventListener("change", () => {

  otherSwitches.forEach(id => {
    const sw = document.getElementById(id);

    if (sw) {
      sw.checked = powerSwitch.checked;
      sw.dispatchEvent(new Event("change"));
    }
  });

});
</script>


<!-- Code for automatic mode and power off mode -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const ranges = ["r1","r2","r3","r4","r5","r6","r7"];

  const defaultValues = ranges.map(id => {
    const el = document.getElementById(id);
    return el ? el.defaultValue : 0;
  });

  const autoSwitch = document.getElementById("oxygenSwitch");

  if (!autoSwitch) return;

  // AUTO MODE RESET LOGIC
  autoSwitch.addEventListener("change", function() {

    if (this.checked) {
      ranges.forEach((id, index) => {
        const range = document.getElementById(id);
        if (!range) return;2

        range.value = defaultValues[index];

        // optional glow
        range.style.boxShadow = "0 0 10px rgba(0,255,0,0.8)";
        setTimeout(() => {
          range.style.boxShadow = "";
        }, 300);
      });
    }

  });

  ranges.forEach(id => {
    const range = document.getElementById(id);
    if (!range) return;

    range.addEventListener("input", () => {
      if (autoSwitch.checked) {
        autoSwitch.checked = false;
        autoSwitch.dispatchEvent(new Event("change"));
      }
    });
  });

});
</script>

<!-- Controlling of the values -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  // increasing numbers
  const waterText = document.getElementById("water_number"); 
  const hydrogenText = document.getElementById("hydrogen_number");
  const oxygenText = document.getElementById("oxygen_number");

  let value = 1000;
  let value1 = 400; 
  let value2 = 600;

  let intervalId = null;

  function startFlow() {
    if (intervalId) return;

    intervalId = setInterval(() => {
      value += 100;
      waterText.textContent = value + " gal";

      value1 += 50;
      hydrogenText.textContent = value1 + " gal";

      value2 += 50;
      oxygenText.textContent = value2 + " gal";
    }, 1000);
  }

  function stopFlow() {
    clearInterval(intervalId);
    intervalId = null;
  }

  // power switch
  const powerSwitch = document.getElementById("powerSwitch");

  // Range input  
  const r1 = document.getElementById("r1");
  const current_power = document.getElementById("current_indication");

  function updatePower() {
    if (powerSwitch.checked) {
      current_power.textContent = "Power: " + r1.value + "V";
    } else {
      current_power.textContent = "Power: 0V"; 
    }
  }

  // initial state
  if (powerSwitch.checked) startFlow();
  updatePower();

  powerSwitch.addEventListener("change", () => {
    if (powerSwitch.checked) {
      startFlow();
    } else {
      stopFlow();
    }
    updatePower(); 
  });

  r1.addEventListener("input", updatePower);

});
    </script>
</body>
</html>
